genshin:
  pass-filter:
    - /ws
    - /ws/**
    - /oauth/**
    - /v3/**
    - /swagger-ui/**
    - /system/user/register/qq
    - /system/invitation/info
    - /system/invitation/consume
  authorities-filter:
    VISITOR:
      - /api/icon/get/**
      - /api/icon_type/get/**
      - /api/icon_doc/**
      - /api/area/get/**
      - /api/item/get/**
      - /api/item_type/get/**
      - /api/item_doc/**
      - /api/marker/get/**
      - /api/marker_doc/**
      - /api/marker_link/get/**
      - /api/marker_link_doc/**
      - /api/notice/get/**
    MAP_USER:
      - /system/role/list
      - /system/user/info/**
      - /system/user/update
      - /system/user/update_password
      - /system/archive/**
      - /api/route/**
      - /api/history/get/**
    MAP_PUNCTUATE:
      - /api/punctuate/**
      - /api/marker/**
      - /api/marker_link/**
      - /api/res/**
    MAP_MANAGER:
      - /api/punctuate_audit/**
      - /api/icon/**
      - /api/icon_type/**
      - /api/item/**
      - /api/item_type/**
      - /api/item_common/**
      - /api/area/**
      - /api/history/**
      - /system/user/register
      - /system/user/info/userList
    ADMIN:
      - /system/**
      - /api/**

ribbon:
  ServerListRefreshInterval: 1000

#springdoc:
#  swagger-ui:
