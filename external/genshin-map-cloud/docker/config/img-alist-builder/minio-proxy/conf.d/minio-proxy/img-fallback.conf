# ============================================
# MinIO Proxy 配置
# ============================================

# --------------------------------------------
# 1. WEBP 文件处理
# --------------------------------------------
# WEBP 文件直接代理到 MinIO，不回退
location ~ .*\.webp$ {
    # MinIO 鉴权相关 headers 必须传递
    proxy_set_header Authorization $http_authorization;
    proxy_set_header 'Access-Control-Allow-Origin' '*';

    # 代理到 MinIO
    proxy_pass http://minio.local:9000;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header REMOTE-HOST $remote_addr;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $http_connection;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;

    # 缓存控制
    add_header X-Cache $upstream_cache_status;
    add_header Cache-Control no-cache;

    # SSL 配置
    proxy_ssl_server_name off;
    proxy_ssl_name $proxy_host;

    # 缓冲配置
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_cache off;
}

# --------------------------------------------
# 2. 图片回退链
# --------------------------------------------
location ~ (.*)\.(jpg|jpeg|jfif|png)$ {
    set $proxy_server "minio.local";
    set $proxy_port "9000";
    set $base_path $1;
    set $origin_ext $2;

    set $proxy_host "http://$proxy_server:$proxy_port";
    set $target_uri $uri;

    access_by_lua_file /etc/nginx/conf.d/minio-proxy/img-fallback-access.lua;

    # MinIO 鉴权相关 headers 必须传递
    proxy_set_header Authorization $http_authorization;
    proxy_set_header 'Access-Control-Allow-Origin' '*';

    # 代理到 MinIO
    proxy_pass http://minio.local:9000$target_uri;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header REMOTE-HOST $remote_addr;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $http_connection;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;

    # 缓存控制
    add_header X-Cache $upstream_cache_status;
    add_header Cache-Control no-cache;

    # SSL 配置
    proxy_ssl_server_name off;
    proxy_ssl_name $proxy_host;

    # 缓冲配置
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_cache off;
}

# --------------------------------------------
# 默认代理 (其他所有请求)
# --------------------------------------------
location / {
    # MinIO 鉴权相关 headers 必须传递
    proxy_set_header Authorization $http_authorization;
    proxy_set_header 'Access-Control-Allow-Origin' '*';

    # 代理到 MinIO
    proxy_pass http://minio.local:9000;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header REMOTE-HOST $remote_addr;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $http_connection;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;

    # 缓存控制
    add_header X-Cache $upstream_cache_status;
    add_header Cache-Control no-cache;

    # SSL 配置
    proxy_ssl_server_name off;
    proxy_ssl_name $proxy_host;

    # 缓冲配置
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_cache off;
}
